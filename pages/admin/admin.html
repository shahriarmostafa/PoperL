<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.4.1/dist/css/bootstrap.min.css" integrity="sha384-Vkoo8x4CGsO3+Hhxv8T/Q5PaXtkKtu6ug5TOeNV6gBiFeWPGFN9MuhOf23Q9Ifjh" crossorigin="anonymous">
    <link rel="stylesheet" href="admin.css">
</head>
<body>
    <section class="admin owner">
        
        <div class="display d-flex">
            <div class="sidebar">
                <div class="display-names">
                    <div class="item container  d-flex">
                        <div class="icon">
                            <img src="temp-image/house-solid.svg" alt="">
                        </div>
                        <p>Dashboard</p>
                    </div>
                    <div class="item container  d-flex">
                        <div class="icon">
                            <img src="temp-image/user-solid.svg" alt="">
                        </div>
                        <p>Admins</p>
                    </div>
                    <div class="item container d-flex">
                        <div class="icon">
                            <img src="temp-image/pen-to-square-solid.svg" alt="">
                        </div>
                        <p>Manage Packages</p>
                    </div>
                    <div class="item container d-flex">
                        <div class="icon">
                            <img src="temp-image/gear-solid.svg" alt="">
                        </div>
                        <p>Settings</p>
                    </div>
                </div>
                
            </div>

            <div class="view">
                <nav class="admin-nav owner-nav p-3">
                    <div class="container d-flex">
                        <div class="logo">
                            <img src="../../logo/logo.png" alt="">
                        </div>
                        <!-- <div class="username">
                            <h3>Owner</h3>
                        </div> -->
                        <div class="profile">
                            <img src="temp-image/328039808_553574763481911_1410511776054264885_n.jpg" alt="">
                        </div>
                    </div>
                </nav>
                <div class="analytics">
                    <div class="st-and-te">
                        <div class="total-teachers box d-flex">
                            <div class="icon">
                                <img src="temp-image/chalkboard-user-solid.svg" alt="">
                            </div>
                            <div class="subject">
                                <div class="text">
                                    <h4>Teachers</h4>
                                </div>
                                <div class="number">531</div>
                            </div>
                        </div>
                        <div class="total-students box d-flex">
                            <div class="icon">
                                <img src="temp-image/graduation-cap-solid.svg" alt="">
                            </div>
                            <div class="subject">
                                <div class="text">
                                    <h4>Students</h4>
                                </div>
                                <div class="number">22300</div>
                            </div>
                        </div>
                        <div class="Revenue box d-flex">
                            <div class="icon">
                                <img src="temp-image/bangladeshi-taka-sign-solid.svg" alt="">
                            </div>
                            <div class="subject">
                                <div class="text">
                                    <h4>Revenue</h4>
                                </div>
                                <div class="number">$178689</div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </section>
</body>
</html>
